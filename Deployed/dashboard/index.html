<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nina Picks — Ops Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#0A0A0F;--card:#161625;--card2:#1E1E32;--card3:#141420;--border:#2A2A45;
    --primary:#7C3AED;--accent:#A78BFA;--txt:#FFFFFF;--txt2:#A1A1AA;--txt3:#6B6B85;
    --success:#34D399;--warn:#FBBF24;--danger:#F87171;--info:#38BDF8;--radius:12px;
    color-scheme:dark;
  }
  /* Follows the OS/browser light-dark preference automatically — same
     media feature on Windows, macOS, iOS, and Android, so no separate
     mobile handling is needed. */
  @media (prefers-color-scheme: light){
    :root{
      --bg:#F7F6FB;--card:#FFFFFF;--card2:#F1EFFA;--card3:#EDEBF7;--border:#E1DEF0;
      --primary:#7C3AED;--accent:#6D28D9;--txt:#17171F;--txt2:#5B5B72;--txt3:#8A8AA3;
      --success:#059669;--warn:#D97706;--danger:#DC2626;--info:#0284C7;--radius:12px;
      color-scheme:light;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk',system-ui,sans-serif;}

  /* background texture: faint route-map grid, evokes the routes this data represents */
  .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:radial-gradient(circle at 1px 1px, rgba(124,58,237,0.10) 1px, transparent 0);
    background-size:26px 26px; opacity:0.5;}

  .wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px 24px 60px;}

  /* ── Header ─────────────────────────────────────────────── */
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
    padding-bottom:18px;margin-bottom:20px;border-bottom:1px solid var(--border);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(155deg,var(--primary),#4c1d95);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;flex-shrink:0;}
  .brand h1{font-size:1.15rem;margin:0;font-weight:700;letter-spacing:0.2px;}
  .brand h1 span{color:var(--accent);}
  .brand p{margin:1px 0 0;font-size:0.72rem;color:var(--txt2);letter-spacing:0.5px;text-transform:uppercase;}

  .head-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .clock{font-size:0.82rem;color:var(--txt2);text-align:right;}
  .clock b{color:var(--txt);font-weight:600;}
  .conn{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--txt2);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--txt3);flex-shrink:0;}
  .dot.live{background:var(--success);box-shadow:0 0 0 0 rgba(52,211,153,0.6);animation:pulse 2s infinite;}
  .dot.down{background:var(--danger);}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(52,211,153,0.55);}
    70%{box-shadow:0 0 0 7px rgba(52,211,153,0);}
    100%{box-shadow:0 0 0 0 rgba(52,211,153,0);}
  }
  .refresh-btn{background:var(--card2);border:1px solid var(--border);color:var(--txt);border-radius:8px;
    padding:8px 14px;font-size:0.78rem;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s;}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
  .refresh-btn svg{transition:transform .5s;}
  .refresh-btn.spinning svg{animation:spin 0.7s linear;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── Setup banner (shown until backend endpoints exist) ───── */
  .setup-banner{background:linear-gradient(90deg,rgba(124,58,237,0.14),rgba(124,58,237,0.03));
    border:1px solid var(--primary);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;
    font-size:0.85rem;line-height:1.55;color:var(--txt2);display:none;}
  .setup-banner b{color:var(--txt);}
  .setup-banner code{background:var(--card3);color:var(--accent);padding:1px 6px;border-radius:5px;font-size:0.82em;}

  /* ── KPI strip ─────────────────────────────────────────────*/
  .kpis{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:14px;margin-bottom:24px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;
    position:relative;overflow:hidden;}
  .kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--kpi-c,var(--primary));}
  .kpi .num{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;font-weight:700;line-height:1;}
  .kpi .lbl{font-size:0.72rem;color:var(--txt2);margin-top:7px;text-transform:uppercase;letter-spacing:0.4px;}

  /* ── Section headers ───────────────────────────────────────*/
  .section-head{display:flex;align-items:center;justify-content:space-between;margin:6px 0 14px;flex-wrap:wrap;gap:10px;}
  .section-head h2{font-size:0.98rem;margin:0;font-weight:700;display:flex;align-items:center;gap:8px;}
  .section-head .count{background:var(--card2);color:var(--txt2);font-size:0.72rem;padding:2px 8px;border-radius:20px;}

  /* ── Filters ───────────────────────────────────────────────*/
  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .search-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;
    color:var(--txt);font-size:0.8rem;width:220px;}
  .search-box:focus{outline:none;border-color:var(--accent);}
  .chip{background:var(--card2);border:1px solid var(--border);color:var(--txt2);font-size:0.74rem;
    padding:6px 12px;border-radius:20px;cursor:pointer;transition:.15s;white-space:nowrap;}
  .chip:hover{color:var(--txt);}
  .chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}

  /* ── Orders board (kanban) ─────────────────────────────────*/
  .board{display:grid;grid-template-columns:repeat(5,minmax(230px,1fr));gap:12px;overflow-x:auto;
    padding-bottom:8px;margin-bottom:30px;}
  .col{background:var(--card3);border:1px solid var(--border);border-radius:var(--radius);
    display:flex;flex-direction:column;min-height:120px;}
  .col-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;
    justify-content:space-between;}
  .col-head .t{font-size:0.76rem;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--stage-c);}
  .col-head .c{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--txt2);font-size:0.85rem;}
  .col-body{padding:10px;display:flex;flex-direction:column;gap:9px;flex:1;max-height:560px;overflow-y:auto;}
  .col-body::-webkit-scrollbar{width:5px;} .col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .empty-col{color:var(--txt3);font-size:0.75rem;text-align:center;padding:20px 8px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 12px;
    cursor:default;transition:.15s;}
  .card:hover{border-color:var(--accent);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .card-oid{font-size:0.76rem;font-weight:700;color:var(--accent);}
  .card-total{font-size:0.8rem;font-weight:700;color:var(--txt);white-space:nowrap;}
  .card-cust{font-size:0.82rem;font-weight:600;color:var(--txt);margin-bottom:2px;}
  .card-shop{font-size:0.72rem;color:var(--txt2);margin-bottom:8px;}
  .card-shop b{color:var(--txt2);font-weight:600;}

  /* route rail — signature element: stage stepper styled like a route board */
  .rail{display:flex;align-items:center;margin:8px 0 8px;}
  .rail .stop{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;position:relative;z-index:1;}
  .rail .stop.done{background:var(--stage-c);}
  .rail .stop.now{background:var(--stage-c);box-shadow:0 0 0 3px color-mix(in srgb, var(--stage-c) 30%, transparent);}
  .rail .seg{flex:1;height:2px;background:var(--border);}
  .rail .seg.done{background:var(--stage-c);}
  .rail.cancelled .stop, .rail.cancelled .seg{background:var(--danger) !important;opacity:0.55;}

  .card-foot{display:flex;justify-content:space-between;align-items:center;font-size:0.72rem;color:var(--txt3);}
  .card-driver{display:flex;align-items:center;gap:5px;color:var(--txt2);}
  .card-driver .pin{width:5px;height:5px;border-radius:50%;background:var(--info);}
  .card-time{font-family:'JetBrains Mono',monospace;}

  /* ── Two-column lower section: drivers + menu activity ─────*/
  .lower{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}

  .driver-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--border);}
  .driver-row:last-child{border-bottom:none;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;
    justify-content:center;font-size:0.8rem;font-weight:700;color:var(--accent);flex-shrink:0;}
  .d-name{font-size:0.85rem;font-weight:600;color:var(--txt);}
  .d-phone{font-size:0.72rem;color:var(--txt3);font-family:'JetBrains Mono',monospace;}
  .badge{margin-left:auto;font-size:0.7rem;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .badge.avail{background:rgba(52,211,153,0.15);color:var(--success);}
  .badge.busy{background:rgba(251,191,36,0.15);color:var(--warn);}
  .badge.off{background:rgba(161,161,170,0.12);color:var(--txt2);}
  .driver-order{font-size:0.68rem;color:var(--txt3);margin-top:2px;}

  .activity-row{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border);}
  .activity-row:last-child{border-bottom:none;}
  .a-icon{width:32px;height:32px;border-radius:8px;background:var(--card2);display:flex;align-items:center;
    justify-content:center;flex-shrink:0;color:var(--accent);}
  .a-name{font-size:0.84rem;font-weight:600;color:var(--txt);}
  .a-meta{font-size:0.72rem;color:var(--txt3);margin-top:1px;}
  .a-when{margin-left:auto;font-size:0.72rem;color:var(--txt2);text-align:right;white-space:nowrap;}
  .a-when.fresh{color:var(--success);}

  .empty-state{color:var(--txt3);font-size:0.82rem;text-align:center;padding:30px 10px;}

  /* ── Order detail modal ─────────────────────────────────────────── */
  .card{cursor:pointer;}
  .modal-overlay{
    position:fixed;inset:0;background:rgba(6,6,12,0.6);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--card);border:1px solid var(--border);border-radius:16px;
    max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
    padding:22px 24px;position:relative;
  }
  .modal-close{
    position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--border);background:var(--card2);color:var(--txt2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;
  }
  .modal-close:hover{color:var(--txt);}
  .modal-head{display:flex;align-items:center;gap:10px;margin-bottom:4px;padding-right:36px;}
  .modal-oid{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;}
  .modal-status-pill{font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.3px;}
  .modal-sub{color:var(--txt2);font-size:0.8rem;margin-bottom:18px;}
  .modal-section{margin-bottom:16px;}
  .modal-section h4{margin:0 0 6px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--txt3);font-weight:700;}
  .modal-row{display:flex;justify-content:space-between;gap:12px;font-size:0.87rem;padding:5px 0;border-bottom:1px dashed var(--border);}
  .modal-row:last-child{border-bottom:none;}
  .modal-row .k{color:var(--txt2);}
  .modal-row .v{font-weight:600;text-align:right;}
  .modal-items{font-size:0.85rem;line-height:1.6;background:var(--card2);border-radius:10px;padding:10px 12px;white-space:pre-wrap;}
  .modal-copy-btn{margin-left:auto;font-size:0.72rem;padding:5px 10px;border-radius:8px;border:1px solid var(--border);
    background:var(--card2);color:var(--txt2);cursor:pointer;}
  .modal-copy-btn:hover{border-color:var(--primary);color:var(--primary);}
  .modal-driver-row{display:flex;gap:8px;align-items:center;}
  .modal-driver-row select{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--txt);font-size:0.85rem;}
  .modal-assign-btn{padding:8px 14px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:0.8rem;font-weight:600;cursor:pointer;white-space:nowrap;}
  .modal-assign-btn:disabled{opacity:0.6;cursor:default;}
  .modal-total{display:flex;justify-content:space-between;align-items:center;font-size:1.05rem;font-weight:700;
    padding-top:12px;margin-top:6px;border-top:1px solid var(--border);}

  @media (max-width:1100px){
    .kpis{grid-template-columns:repeat(2,1fr);}
    .board{grid-template-columns:repeat(5,240px);}
    .lower{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark display">NP</div>
      <div>
        <h1>Nina Picks <span>· Ops Dashboard</span></h1>
        <p>Solano · Bayombong · Bambang</p>
      </div>
    </div>
    <div class="head-right">
      <div class="conn"><span class="dot" id="connDot"></span><span id="connText">Connecting…</span></div>
      <div class="clock">Last refresh: <b id="lastRefresh">—</b> · next in <b id="countdown">--</b>s</div>
      <button class="refresh-btn" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        Refresh
      </button>
    </div>
  </header>

  <div class="setup-banner" id="setupBanner">
    <b>Connecting…</b> If this message doesn't disappear, sign in when prompted, or check that your
    account has a <code>super_admin</code> row in <code>profiles</code>.
  </div>

  <div class="kpis" id="kpiRow"></div>

  <div class="section-head">
    <h2>🍽 Live Orders <span class="count" id="orderCount">0</span></h2>
    <div class="filters">
      <input type="text" class="search-box" id="searchBox" placeholder="Search order, customer, restaurant…">
      <div id="muniChips" class="filters"></div>
    </div>
  </div>
  <div class="board" id="board"></div>

  <div class="lower">
    <div class="panel">
      <div class="section-head">
        <h2>🛵 Drivers <span class="count" id="driverCount">0</span></h2>
      </div>
      <div id="driverList"></div>
    </div>
    <div class="panel">
      <div class="section-head">
        <h2>📋 Menu Activity <span class="count" id="activityCount">0</span></h2>
      </div>
      <div id="activityList"></div>
    </div>
  </div>

</div>

<div class="modal-overlay" id="orderModalOverlay" onclick="if(event.target===this) closeOrderModal()">
  <div class="modal-box" id="orderModalBox"></div>
</div>

<script type="module">
// ══════════════════════════════════════════════════════════════════════════
//  NINA PICKS — DASHBOARD.HTML (Supabase)
//  Migrated from Apps Script. Function names/DOM ids unchanged; only the
//  internals moved from fetch(API_URL, {action:...}) to Supabase.
//
//  IMPORTANT GAP CARRIED OVER FROM THE ORIGINAL FILE — see the message
//  accompanying this migration: this dashboard has no assign-driver or
//  change-status controls in its current HTML (only a read-only order
//  modal), even though the business rules say Dashboard should be able to
//  do both. Nothing removed or changed here — just flagging it wasn't
//  there to migrate.
//
//  NEW REQUIREMENT INTRODUCED BY THIS MIGRATION (not a feature change,
//  a necessity): the old Apps Script URL had no login and no real access
//  control — anyone with the link could call any action. Once Row Level
//  Security is enabled (per the schema migration), anonymous requests to
//  restaurants/orders/drivers will return empty results. This dashboard
//  needs a signed-in super_admin session to see anything at all. Rather
//  than add new login UI/markup you haven't asked for, this uses a
//  minimal native-prompt gate so the existing HTML stays untouched.
// ══════════════════════════════════════════════════════════════════════════

import { supabase } from '../supabase-client.js';
import * as restaurantsApi from '../api/restaurants.js';
import * as driversApi from '../api/drivers.js';
import * as productsApi from '../api/products.js';
import * as ordersApi from '../api/orders.js';

const REFRESH_SECONDS = 25;

const STAGES = [
  { key: 'Pending',                short: 'New',     color: 'var(--info)'   },
  { key: 'Accepted',                short: 'Accept',  color: 'var(--info)'   },
  { key: 'Preparing',               short: 'Prep',    color: 'var(--warn)'   },
  { key: 'Ready for Pickup',        short: 'Ready',   color: 'var(--warn)'   },
  { key: 'Picked Up / On the Way',  short: 'On Way',  color: 'var(--primary)'},
];
const stageIndex = k => STAGES.findIndex(s => s.key === k);

// Full set (unlike STAGES above, which drives the kanban columns and
// intentionally excludes terminal states) — used for the modal's status
// dropdown so dashboard staff can also move an order to Delivered/Cancelled.
const ORDER_STATUSES = ['Pending', 'Accepted', 'Preparing', 'Ready for Pickup', 'Picked Up / On the Way', 'Delivered', 'Cancelled'];

let state = { orders: [], drivers: [], activity: [], restaurants: [], orderStats: null, muni: 'All', search: '' };
let countdownTimer = null, secondsLeft = REFRESH_SECONDS;

function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function peso(n){ return '₱' + (Number(n)||0).toLocaleString('en-PH', {minimumFractionDigits:0, maximumFractionDigits:2}); }

// Orders now come back with real ISO timestamps from Postgres, so this
// just needs to handle a normal Date parse — kept as its own function
// (rather than inlined) in case any legacy string-format rows still exist.
function parsePhTimestamp(str){
  if (!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function timeAgo(date){
  if (!date) return '—';
  const s = Math.floor((Date.now() - date.getTime())/1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60)+'m ago';
  if (s < 86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// ── Minimal auth gate (see note above) ────────────────────────────────────
async function ensureAuthenticated() {
  const { data: { session: existing } } = await supabase.auth.getSession();
  if (existing) return true;

  for (let attempt = 0; attempt < 3; attempt++) {
    const email = prompt('Dashboard login — email:');
    if (!email) return false;
    const password = prompt('Password:');
    if (!password) return false;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (!error) return true;
    alert('Login failed: ' + error.message);
  }
  return false;
}

async function fetchAll(){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  let authIssue = false;

  try {
    const [orders, drivers, activity, restaurants, orderStats] = await Promise.all([
      ordersApi.getAllOrders({ activeOnly: true }).catch(() => []),
      driversApi.getDrivers().catch(() => []),
      productsApi.getMenuActivity().catch(() => []),
      restaurantsApi.getRestaurants().catch(() => []),
      ordersApi.getOrderStats().catch(() => null),
    ]);

    state.orders      = orders;
    state.drivers     = drivers;
    state.activity     = activity;
    state.restaurants  = restaurants;
    state.orderStats   = orderStats;

    if (!restaurants.length && !drivers.length) authIssue = true; // likely an RLS/auth problem

    document.getElementById('connDot').className = 'dot live';
    document.getElementById('connText').textContent = 'Live';
  } catch (err) {
    document.getElementById('connDot').className = 'dot down';
    document.getElementById('connText').textContent = 'Connection lost';
    authIssue = true;
  }

  const banner = document.getElementById('setupBanner');
  if (authIssue) {
    banner.innerHTML = '<b>No data came back.</b> This usually means the signed-in account isn\'t recognized as a super_admin in the <code>profiles</code> table, or the session expired — try refreshing and logging in again.';
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString('en-PH', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  btn.classList.remove('spinning');

  renderKpis();
  renderMuniChips();
  renderBoard();
  renderDrivers();
  renderActivity();
}

async function loadAll(){
  const ok = await ensureAuthenticated();
  if (!ok) {
    document.getElementById('connText').textContent = 'Not signed in';
    return;
  }
  await fetchAll();
}

function restaurantMuni(restId){
  const r = state.restaurants.find(x => x.id === restId);
  return r ? (r.municipality || '') : '';
}

function renderKpis(){
  const active = state.orders;
  const valueInFlight = active.reduce((sum,o) => sum + (Number(o.total)||0), 0);
  const availCount = state.drivers.filter(d => d.availability === 'Available').length;
  const busyCount  = state.drivers.filter(d => d.availability === 'Currently on Delivery').length;
  const openRest   = state.restaurants.filter(r => r.status === 'Open').length;

  const cards = [
    { num: active.length, lbl: 'Active Orders', c: 'var(--primary)' },
    { num: peso(valueInFlight), lbl: 'Value in Flight', c: 'var(--accent)' },
    { num: availCount, lbl: 'Drivers Available', c: 'var(--success)' },
    { num: busyCount, lbl: 'On Delivery', c: 'var(--warn)' },
    { num: openRest + ' / ' + state.restaurants.length, lbl: 'Restaurants Open', c: 'var(--info)' },
  ];

  const s = state.orderStats;
  if (s) {
    cards.push({ num: s.byStatus['Delivered']  ?? 0, lbl: 'Delivered (All-Time)', c: 'var(--success)' });
    cards.push({ num: s.byStatus['Cancelled']  ?? 0, lbl: 'Cancelled (All-Time)', c: 'var(--danger)'  });
    cards.push({ num: s.todayCount, lbl: "Orders Today", c: 'var(--info)' });
  }

  document.getElementById('kpiRow').innerHTML = cards.map(k => `
    <div class="kpi" style="--kpi-c:${k.c}">
      <div class="num display">${k.num}</div>
      <div class="lbl">${k.lbl}</div>
    </div>`).join('');
}

function renderMuniChips(){
  const munis = ['All', ...new Set(state.restaurants.map(r => r.municipality).filter(Boolean))];
  document.getElementById('muniChips').innerHTML = munis.map(m =>
    `<div class="chip ${state.muni===m?'active':''}" data-muni="${esc(m)}">${esc(m)}</div>`
  ).join('');
  document.querySelectorAll('#muniChips .chip').forEach(el => {
    el.onclick = () => { state.muni = el.dataset.muni; renderBoard(); renderMuniChips(); };
  });
}

function filteredOrders(){
  const q = state.search.trim().toLowerCase();
  return state.orders.filter(o => {
    if (state.muni !== 'All' && restaurantMuni(o.restaurantId) !== state.muni) return false;
    if (!q) return true;
    return (o.orderId||'').toLowerCase().includes(q)
        || (o.name||'').toLowerCase().includes(q)
        || (o.restaurantName||'').toLowerCase().includes(q);
  });
}

function railHtml(status){
  const isCancelled = status === 'Cancelled';
  const idx = stageIndex(status);
  let segs = '';
  STAGES.forEach((s, i) => {
    const done = !isCancelled && i <= idx;
    const now  = !isCancelled && i === idx;
    segs += `<div class="stop ${done?'done':''} ${now?'now':''}" style="--stage-c:${s.color}" title="${s.key}"></div>`;
    if (i < STAGES.length - 1) {
      const segDone = !isCancelled && i < idx;
      segs += `<div class="seg ${segDone?'done':''}" style="--stage-c:${s.color}"></div>`;
    }
  });
  return `<div class="rail ${isCancelled?'cancelled':''}">${segs}</div>`;
}

function orderCard(o){
  const muni = restaurantMuni(o.restaurantId);
  const ts = parsePhTimestamp(o.timestamp);
  const stageColor = STAGES[Math.max(stageIndex(o.status),0)]?.color || 'var(--txt3)';
  return `
    <div class="card" onclick="openOrderModal('${esc(o.orderId)}')">
      <div class="card-top">
        <span class="card-oid mono">${esc(o.orderId)}</span>
        <span class="card-total">${peso(o.total)}</span>
      </div>
      <div class="card-cust">${esc(o.name) || 'Guest'}</div>
      <div class="card-shop"><b>${esc(o.restaurantName)}</b>${muni ? ' · '+esc(muni) : ''}</div>
      ${o.status !== 'Cancelled' ? railHtml(o.status) : `<div style="font-size:0.72rem;color:var(--danger);font-weight:600;margin:8px 0;">✕ Cancelled</div>`}
      <div class="card-foot">
        <span class="card-driver">${o.driverName ? `<span class="pin"></span>${esc(o.driverName)}` : 'Unassigned'}</span>
        <span class="card-time mono">${timeAgo(ts)}</span>
      </div>
    </div>`;
}

function renderBoard(){
  const orders = filteredOrders();
  document.getElementById('orderCount').textContent = orders.length;

  const cols = STAGES.map(s => ({ ...s, orders: orders.filter(o => o.status === s.key) }));
  document.getElementById('board').innerHTML = cols.map(c => `
    <div class="col">
      <div class="col-head">
        <span class="t" style="--stage-c:${c.color}">${c.short}</span>
        <span class="c">${c.orders.length}</span>
      </div>
      <div class="col-body">
        ${c.orders.length ? c.orders.map(orderCard).join('') : '<div class="empty-col">No orders</div>'}
      </div>
    </div>`).join('');
}

function renderDrivers(){
  document.getElementById('driverCount').textContent = state.drivers.length;
  if (!state.drivers.length) {
    document.getElementById('driverList').innerHTML = '<div class="empty-state">No drivers found.</div>';
    return;
  }
  const badgeFor = a => a === 'Available' ? ['avail','Available']
                     : a === 'Currently on Delivery' ? ['busy','On Delivery']
                     : ['off','Not Available'];

  const sorted = [...state.drivers].sort((a,b) => {
    const rank = v => v==='Currently on Delivery'?0:v==='Available'?1:2;
    return rank(a.availability) - rank(b.availability);
  });

  document.getElementById('driverList').innerHTML = sorted.map(d => {
    const [cls,label] = badgeFor(d.availability);
    const initials = (d.name||d.id||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const activeOrder = state.orders.find(o => o.driverId === d.id);
    return `
      <div class="driver-row">
        <div class="avatar">${esc(initials)}</div>
        <div>
          <div class="d-name">${esc(d.name || d.id)}</div>
          <div class="d-phone">${esc(d.phone || d.id)}</div>
          ${activeOrder ? `<div class="driver-order">${esc(activeOrder.orderId)} → ${esc(activeOrder.restaurantName)}</div>` : ''}
        </div>
        <span class="badge ${cls}">${label}</span>
      </div>`;
  }).join('');
}

function renderActivity(){
  document.getElementById('activityCount').textContent = state.activity.length;
  if (!state.activity.length) {
    document.getElementById('activityList').innerHTML = '<div class="empty-state">No menu updates recorded yet.</div>';
    return;
  }
  document.getElementById('activityList').innerHTML = state.activity.slice(0, 12).map(a => {
    const ts = parsePhTimestamp(a.lastUpdated);
    const fresh = ts && (Date.now() - ts.getTime()) < 3600*1000;
    return `
      <div class="activity-row">
        <div class="a-icon">📋</div>
        <div>
          <div class="a-name">${esc(a.restaurantName)}</div>
          <div class="a-meta">${a.itemsChanged} item${a.itemsChanged===1?'':'s'} changed</div>
        </div>
        <div class="a-when ${fresh?'fresh':''}">${timeAgo(ts)}</div>
      </div>`;
  }).join('');
}

// ── Order detail modal ────────────────────────────────────────────────────
const STATUS_PILL_COLOR = {
  'Pending':                 'var(--info)',
  'Accepted':                'var(--info)',
  'Preparing':               'var(--warn)',
  'Ready for Pickup':        'var(--warn)',
  'Picked Up / On the Way':  'var(--primary)',
  'Delivered':               'var(--success)',
  'Cancelled':               'var(--danger)',
};

function findOrder(orderId){
  return state.orders.find(o => o.orderId === orderId) || null;
}

function openOrderModal(orderId){
  const o = findOrder(orderId);
  if (!o) return; // fell out of the active board (e.g. delivered/cancelled since last refresh)

  const muni = restaurantMuni(o.restaurantId);
  const ts = parsePhTimestamp(o.timestamp);
  const pillColor = STATUS_PILL_COLOR[o.status] || 'var(--txt3)';

  document.getElementById('orderModalBox').innerHTML = `
    <div class="modal-close" onclick="closeOrderModal()">✕</div>
    <div class="modal-head">
      <span class="modal-oid mono">${esc(o.orderId)}</span>
      <button class="modal-copy-btn" onclick="copyOrderDetails('${o.orderId}')" title="Copy order details">📋 Copy</button>
      <span class="modal-status-pill" style="background:${pillColor}22;color:${pillColor};">${esc(o.status)}</span>
    </div>
    <div class="modal-sub">${ts ? ts.toLocaleString('en-PH', {dateStyle:'medium', timeStyle:'short'}) : esc(o.timestamp)} · ${timeAgo(ts)}</div>

    <div class="modal-section">
      <h4>Customer</h4>
      <div class="modal-row"><span class="k">Name</span><span class="v">${esc(o.name) || 'Guest'}</span></div>
      ${o.phone ? `<div class="modal-row"><span class="k">Phone</span><span class="v">${esc(o.phone)}</span></div>` : ''}
      ${o.location ? `<div class="modal-row"><span class="k">Location</span><span class="v">${esc(o.location)}</span></div>` : ''}
    </div>

    <div class="modal-section">
      <h4>Restaurant</h4>
      <div class="modal-row"><span class="k">Shop</span><span class="v">${esc(o.restaurantName)}</span></div>
      ${muni ? `<div class="modal-row"><span class="k">Municipality</span><span class="v">${esc(muni)}</span></div>` : ''}
    </div>

    <div class="modal-section">
      <h4>Items</h4>
      <div class="modal-items">${esc(o.items) || '— (no items on this order — check order_items RLS if unexpected)'}</div>
    </div>

    <div class="modal-section">
      <h4>Assign Driver</h4>
      <div class="modal-driver-row">
        <select id="modal-drv-${o.orderId}">${driverOpts(state.drivers, o.driverId || '')}</select>
        <button class="modal-assign-btn" onclick="assignDriverFromModal('${o.orderId}')">Assign</button>
      </div>
    </div>

    <div class="modal-section">
      <h4>Order Status</h4>
      <div class="modal-driver-row">
        <select id="modal-status-${o.orderId}">${ORDER_STATUSES.map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}</select>
        <button class="modal-assign-btn" onclick="updateStatusFromModal('${o.orderId}')">Update</button>
      </div>
    </div>

    <div class="modal-section">
      <h4>Fulfillment</h4>
      <div class="modal-row"><span class="k">Driver</span><span class="v">${o.driverName ? esc(o.driverName) + (o.driverPhone ? ' · '+esc(o.driverPhone) : '') : 'Unassigned'}</span></div>
      ${o.paymentMethod ? `<div class="modal-row"><span class="k">Payment</span><span class="v">${esc(o.paymentMethod)}</span></div>` : ''}
      ${o.notes ? `<div class="modal-row"><span class="k">Notes</span><span class="v">${esc(o.notes)}</span></div>` : ''}
    </div>

    <div class="modal-total"><span>Total</span><span>${peso(o.total)}</span></div>
  `;
  document.getElementById('orderModalOverlay').classList.add('open');
}

// Same eligibility rule admin.html uses: only show drivers who are
// currently "Available", plus whoever's already assigned (even if busy)
// so re-assigning/unassigning doesn't hide the current selection.
function driverOpts(list, selectedId) {
  const blank = `<option value="">— Unassigned —</option>`;
  const eligible = list.filter(d => d.availability === 'Available' || d.id === selectedId);
  if (!eligible.length) return blank + `<option value="" disabled>No available drivers</option>`;
  const opts = eligible.map(d => {
    const tag = d.id === selectedId && d.availability !== 'Available' ? ` (${d.availability})` : '';
    return `<option value="${d.id}" ${d.id === selectedId ? 'selected' : ''}>${d.id} — ${esc(d.name)}${tag}</option>`;
  }).join('');
  return blank + opts;
}

async function assignDriverFromModal(orderId) {
  const sel = document.getElementById(`modal-drv-${orderId}`);
  const btn = sel ? sel.parentElement.querySelector('.modal-assign-btn') : null;
  const driverId = sel ? sel.value : '';

  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    await ordersApi.assignDriver(orderId, driverId);
    const ord = state.orders.find(o => o.orderId === orderId);
    const drv = state.drivers.find(d => d.id === driverId);
    if (ord) { ord.driverId = driverId; ord.driverName = drv ? drv.name : ''; ord.driverPhone = drv ? drv.phone : ''; }
    renderBoard(); renderDrivers();
    openOrderModal(orderId); // re-render modal with the updated assignment
  } catch (err) {
    alert('Could not assign driver: ' + (err.message || 'unknown error'));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Assign'; }
  }
}

// Unlike admin.html and driver.html, the dashboard is meant to be able to
// move an order to ANY status (it's the super_admin view) — so this does
// not pass { asDriver: true } and is not restricted to the DRIVER_ALLOWED_STATUSES
// subset in orders.js.
async function updateStatusFromModal(orderId) {
  const sel = document.getElementById(`modal-status-${orderId}`);
  const btn = sel ? sel.parentElement.querySelector('.modal-assign-btn') : null;
  const newStatus = sel ? sel.value : null;
  if (!newStatus) return;

  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    await ordersApi.updateOrderStatus(orderId, newStatus);
    const ord = state.orders.find(o => o.orderId === orderId);
    if (ord) ord.status = newStatus;
    renderBoard();
    openOrderModal(orderId); // re-render modal with the updated status pill
  } catch (err) {
    alert('Could not update status: ' + (err.message || 'unknown error'));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Update'; }
  }
}

// Plain-text summary for pasting into Slack/Viber/etc when coordinating
// with a restaurant or driver over chat.
function copyOrderDetails(orderId) {
  const o = findOrder(orderId);
  if (!o) return;
  const lines = [
    `Order ${o.orderId}`,
    `Status: ${o.status}`,
    `Customer: ${o.name || 'Guest'}${o.phone ? ' · ' + o.phone : ''}`,
    o.location ? `Location: ${o.location}` : null,
    `Shop: ${o.restaurantName || ''}`,
    `Items: ${o.items || '—'}`,
    `Total: ${peso(o.total)}`,
    o.paymentMethod ? `Payment: ${o.paymentMethod}` : null,
    o.notes ? `Notes: ${o.notes}` : null,
    `Driver: ${o.driverName ? o.driverName + (o.driverPhone ? ' · ' + o.driverPhone : '') : 'Unassigned'}`,
  ].filter(Boolean).join('\n');

  navigator.clipboard.writeText(lines).then(() => {
    const btn = document.querySelector('.modal-copy-btn');
    if (btn) { const orig = btn.textContent; btn.textContent = '✅ Copied'; setTimeout(() => { btn.textContent = orig; }, 1500); }
  }).catch(() => alert('Could not copy — your browser may be blocking clipboard access.'));
}

function closeOrderModal(){
  document.getElementById('orderModalOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeOrderModal();
});

document.getElementById('searchBox').addEventListener('input', e => {
  state.search = e.target.value; renderBoard();
});
document.getElementById('refreshBtn').addEventListener('click', () => { secondsLeft = REFRESH_SECONDS; fetchAll(); });

function tickCountdown(){
  secondsLeft -= 1;
  if (secondsLeft <= 0) { secondsLeft = REFRESH_SECONDS; fetchAll(); }
  document.getElementById('countdown').textContent = secondsLeft;
}

// ── Re-attach functions referenced by inline onclick handlers ────────────
Object.assign(window, { openOrderModal, closeOrderModal, assignDriverFromModal, updateStatusFromModal, copyOrderDetails });

loadAll();
countdownTimer = setInterval(tickCountdown, 1000);
</script>
</body>
